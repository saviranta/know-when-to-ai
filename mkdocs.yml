site_name: "Know When to AI"
site_description: "A field guide to find nails that can be hammered with AI"

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra_css:
  - stylesheets/matrix.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js

nav:
  - Home: index.md
  - Chapters:
      - "1 — What this book is": ch-1.md
      - "2 — Five modes of AI use": ch-2.md
      - "3 — The method at a glance": ch-3.md
      - "4 — Tier 0 checks": ch-4.md
      - "5 — G1 Observe": ch-5.md
      - "6 — G2 Decompose": ch-6.md
      - "7 — G3 Route": ch-7.md
      - "8 — G4 Sequence": ch-8.md
      - "9 — G5 Commit": ch-9.md
      - "10 — Access indices": ch-10.md
      - "11 — Overlays": ch-11.md
  - Toolkit:
      - "G4 — Dependency graph (PERT/CPM)": tool-dependency-graph.md
      - "G4 — Reversibility classes": tool-reversibility-classes.md
      - "G4 — Blast-radius estimation": tool-blast-radius-estimation.md
      - "G4 — Three-stage rollout": tool-three-stage-rollout.md
      - "G5 — Rollback-trigger design": tool-rollback-trigger-design.md
      - "G5 — Named-owner discipline": tool-named-owner-discipline.md
      - "G5 — Review-cadence matrix": tool-review-cadence-matrix.md
      - "G5 — Sunset criteria worksheet": tool-sunset-criteria-worksheet.md
      - "Cross-gate — Bow-tie analysis": tool-bow-tie-analysis.md
      - "Cross-gate — STPA": tool-stpa.md
  - Rendering demos:
      - "Mermaid — method spine": illustration-1-1.md
      - "SVG — four answers": illustration-2-1.md
      - "CSS — routing matrix": illustration-8-1.md
