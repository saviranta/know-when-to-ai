      - "6 — G2 Decompose": ch-6.md
      - "7 — G3 Route": ch-7.md
      - "8 — G4 Sequence": ch-8.md
      - "9 — G5 Commit": ch-9.md
      - "10 — Access indices": ch-10.md
      - "11 — Overlays": ch-11.md
